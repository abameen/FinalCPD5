<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ann Arbor Skyline — Athletes</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Ann Arbor Skyline</h1>
      <nav>
        <ul>
          
          <li><a href="index.html">Athletes</a></li>
          <li><a href="mainMeets.html">Meets</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <form action="#" method="get">
        <fieldset>
          <legend>Search and sort</legend>
          <p id="search-help">Type to filter athletes or choose a sort order.</p>
          <label for="search">Search</label>
          <input id="search" name="search" type="search" aria-describedby="search-help" />
          <label for="sort">Sort</label>
          <select id="sort" name="sort">
            <option value="name-asc">Sort by athlete name (A–Z)</option>
            <option value="name-desc">Sort by athlete name (Z–A)</option>
          </select>
          
        </fieldset>
      </form>
      <section>
        <table>
          <thead>
            <tr>
              <th scope="col">Level</th>
              <th scope="col">Athlete Name</th>
              <th scope="col">Best Time</th>
              <th scope="col">Best Place</th>
            </tr>
          </thead>

          <tbody>
              <tr>
                <td data-label="Level">V</td>
                <td data-label="Athlete Name"><a href="athlete.html">Garrett Comer</a></td>
                <td data-label="Best Time">16:42</td>
                <td data-label="Best Place">2</td>
              </tr>

              <tr>
                <td data-label="Level">V</td>
                <td data-label="Athlete Name"><a href="athlete2.html">Becca Van Lent</a></td>
                <td data-label="Best Time">17:05</td>
                <td data-label="Best Place">1</td>
              </tr>

              <tr>
                <td data-label="Level">JV</td>
                <td data-label="Athlete Name"><a href="athletezekke3.html">Zekke Laferty</a></td>
                <td data-label="Best Time">17:33</td>
                <td data-label="Best Place">5</td>
              </tr>

              <tr>
                <td data-label="Level">JV</td>
                <td data-label="Athlete Name"><a href="athlete4.html">Nick Yuan</a></td>
                <td data-label="Best Time">18:10</td>
                <td data-label="Best Place">9</td>
              </tr>
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
